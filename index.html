<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DF TV Series Recommendations</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #C0392B;
    --red-bg: #E8C4BF;
    --card-bg: #D9A09A;
    --inner-card: #EDD5D1;
    --gold: #D4A017;
    --cream: #F5F0E8;

    /* Genre colors from legend */
    --color-action:    #C0392B;
    --color-comedy:    #E8B84B;
    --color-documentary: #2C5F8A;
    --color-drama:     #7B4FA6;
    --color-fantasy:   #4A7EC7;
    --color-holiday:   #4CAF50;
    --color-horror:    #9E9E9E;
    --color-musical:   #2E8B77;
    --color-thriller:  #C2547A;
    --color-western:   #E87B2C;
    --color-animation: #E8B84B;
    --color-default:   #C0392B;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #f0e0dc;
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    padding: 30px 20px 60px;
  }

  /* ── PAGE HEADER ── */
  .page-header {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 32px;
  }
  .page-header h1 {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 2.6rem;
    color: var(--red);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .page-header p {
    font-size: .95rem;
    color: #7a3a33;
    font-weight: 700;
  }

  /* ── FILTER BAR ── */
  .filter-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 28px;
    align-items: center;
  }
  .filter-bar span {
    font-family: 'Black Han Sans', sans-serif;
    font-size: .85rem;
    color: var(--red);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-right: 4px;
  }
  .filter-btn {
    border: none;
    cursor: pointer;
    border-radius: 20px;
    padding: 6px 16px;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: .78rem;
    text-transform: uppercase;
    letter-spacing: .5px;
    color: #fff;
    transition: transform .15s, opacity .15s, box-shadow .15s;
    box-shadow: 0 2px 6px rgba(0,0,0,.15);
  }
  .filter-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,0,0,.2); }
  .filter-btn.active { outline: 3px solid #fff; outline-offset: 2px; }
  
  /* ── SORT DROPDOWN ── */
  .sort-container {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 28px;
  }
  .sort-container label {
    font-family: 'Black Han Sans', sans-serif;
    font-size: .85rem;
    color: var(--red);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .sort-dropdown {
    border: 2px solid var(--red);
    cursor: pointer;
    border-radius: 20px;
    padding: 6px 14px;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: .78rem;
    text-transform: uppercase;
    letter-spacing: .5px;
    color: var(--red);
    background: #fff;
    transition: all .15s;
    box-shadow: 0 2px 6px rgba(0,0,0,.08);
  }
  .sort-dropdown:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,0,0,.12); }

  /* ── GENRE SECTIONS ── */
  .genre-section {
    margin-bottom: 32px;
  }

  .genre-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .genre-label-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    border-radius: 30px;
    padding: 6px 20px 6px 10px;
    color: #fff;
    font-family: 'Black Han Sans', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    box-shadow: 0 3px 10px rgba(0,0,0,.2);
  }
  .genre-label-pill .dot {
    width: 18px; height: 18px;
    border-radius: 50%;
    background: rgba(255,255,255,.35);
    flex-shrink: 0;
  }
  .genre-count {
    font-family: 'Nunito', sans-serif;
    font-size: .82rem;
    font-weight: 800;
    color: #7a3a33;
    background: rgba(255,255,255,.5);
    border-radius: 12px;
    padding: 2px 10px;
  }

  /* ── GRID ── */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 14px;
  }

  /* ── CARD ── */
  .card {
    background: var(--inner-card);
    border-radius: 16px;
    padding: 10px 10px 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    transition: transform .2s, box-shadow .2s;
    box-shadow: 0 3px 10px rgba(0,0,0,.12);
    position: relative;
  }
  .card:hover {
    transform: translateY(-5px) scale(1.02);
    box-shadow: 0 10px 28px rgba(0,0,0,.22);
    z-index: 2;
  }

  .card-title {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: .78rem;
    text-align: center;
    color: #3a1a15;
    margin-bottom: 8px;
    line-height: 1.25;
    min-height: 2.5em;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .poster-wrap {
    position: relative;
    width: 100%;
    padding-top: 145%;
    border-radius: 10px;
    overflow: hidden;
    background: #b59894;
    box-shadow: inset 0 0 0 2px rgba(0,0,0,.08);
  }
  .poster-wrap img {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  .poster-wrap .award-badge {
    position: absolute;
    bottom: -8px; right: -8px;
    width: 52px; height: 52px;
  }
  .poster-wrap.no-poster {
    background: #cd9494;
  }

  .card-meta {
    margin-top: 10px;
    font-size: .72rem;
    font-weight: 700;
    color: #7a3a33;
    text-align: center;
    letter-spacing: .3px;
  }

  /* ── AWARD BADGE SVG ── */
  .badge-winner { filter: drop-shadow(0 2px 4px rgba(0,0,0,.3)); }
  .badge-nominee { filter: drop-shadow(0 2px 4px rgba(0,0,0,.25)); }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.55);
    backdrop-filter: blur(4px);
    z-index: 100;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    opacity: 0; pointer-events: none;
    transition: opacity .25s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--inner-card);
    border-radius: 20px;
    max-width: 460px; width: 100%;
    padding: 24px;
    box-shadow: 0 20px 60px rgba(0,0,0,.35);
    transform: translateY(20px);
    transition: transform .25s;
    position: relative;
  }
  .modal-overlay.open .modal { transform: translateY(0); }

  .modal-close {
    position: absolute; top: 14px; right: 16px;
    background: none; border: none; cursor: pointer;
    font-size: 1.4rem; color: #7a3a33; font-weight: 900; line-height: 1;
  }
  .modal-inner { display: flex; gap: 18px; align-items: center; }
  .modal-poster {
    width: 110px; flex-shrink: 0;
    border-radius: 10px; overflow: hidden;
    box-shadow: 0 4px 14px rgba(0,0,0,.25);
  }
  .modal-poster img { width: 100%; display: block; }
  .modal-info { flex: 1; }
  .modal-title {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 1.2rem; color: var(--red);
    text-transform: uppercase; letter-spacing: 1px;
    line-height: 1.2; margin-bottom: 6px;
  }
  .modal-year {
    font-size: .82rem; font-weight: 800; color: #7a3a33; margin-bottom: 10px;
  }
  .modal-genres { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 12px; }
  .modal-genre-tag {
    font-size: .7rem; font-weight: 800; text-transform: uppercase;
    padding: 3px 10px; border-radius: 12px; color: #fff;
    letter-spacing: .5px;
  }
  .modal-awards-title {
    font-family: 'Black Han Sans', sans-serif;
    font-size: .78rem; color: #3a1a15; text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 6px; margin-top: 4px;
  }
  .modal-awards ul { list-style: none; padding: 0; }
  .modal-awards ul li {
    font-size: .72rem; font-weight: 700; color: #5a2a22;
    padding: 3px 0 3px 14px; position: relative; line-height: 1.4;
    border-bottom: 1px solid rgba(0,0,0,.06);
  }
  .modal-awards ul li::before {
    content: '🏆'; position: absolute; left: 0; top: 3px; font-size: .65rem;
  }

  /* ── LEGEND ── */
  .legend-section {
    background: var(--inner-card);
    border-radius: 16px;
    padding: 18px 20px;
    margin-bottom: 28px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px 20px;
    align-items: center;
  }
  .legend-section h3 {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 1rem; color: var(--red); text-transform: uppercase;
    letter-spacing: 1px; width: 100%; margin-bottom: 4px;
  }
  .legend-item {
    display: flex; align-items: center; gap: 6px;
    font-size: .75rem; font-weight: 800; color: #3a1a15;
    text-transform: uppercase; letter-spacing: .4px;
  }
  .legend-dot {
    width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0;
  }
  .legend-badge-row {
    display: flex; gap: 20px; flex-wrap: wrap; align-items: center;
    width: 100%; margin-top: 4px; border-top: 1px solid rgba(0,0,0,.08); padding-top: 10px;
  }
  .legend-badge-item {
    display: flex; align-items: center; gap: 8px;
    font-size: .75rem; font-weight: 700; color: #5a2a22;
  }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="page-header">
  <div>
    <h1>DigitalFish TV Series Guide</h1>
  </div>
</div>

<!-- LEGEND -->
<div class="legend-section">
  <h3>Genre Legend</h3>
  <div class="legend-badge-row">
    <div class="legend-badge-item">
      <svg width="32" height="32" viewBox="0 0 52 52"><circle cx="26" cy="26" r="25" fill="#f5f0e8" stroke="#c8b89a" stroke-width="2"/><text x="26" y="20" text-anchor="middle" font-size="8" font-weight="900" fill="#c0392b" font-family="sans-serif">OSCAR</text><text x="26" y="30" text-anchor="middle" font-size="7" font-weight="900" fill="#c0392b" font-family="sans-serif">NOMINEE</text><text x="26" y="43" text-anchor="middle" font-size="14">🏆</text></svg>
      Nominee — 1+ Oscar nominations
    </div>
    <div class="legend-badge-item">
      <svg width="32" height="32" viewBox="0 0 52 52"><circle cx="26" cy="26" r="25" fill="#f5f0e8" stroke="#D4A017" stroke-width="2.5"/><text x="26" y="20" text-anchor="middle" font-size="8" font-weight="900" fill="#b8860b" font-family="sans-serif">OSCAR</text><text x="26" y="30" text-anchor="middle" font-size="7" font-weight="900" fill="#b8860b" font-family="sans-serif">WINNER</text><text x="26" y="43" text-anchor="middle" font-size="14">🏆</text></svg>
      Winner — 1+ Oscar wins
    </div>
  </div>
</div>

<!-- FILTER BAR -->
<div class="filter-bar">
  <span>Filter:</span>
</div>

<!-- SORT -->
<div class="sort-container">
  <label for="sort-select">Sort:</label>
  <select id="sort-select" class="sort-dropdown">
    <option value="a-z">A to Z</option>
    <option value="year">Year</option>
  </select>
</div>

<!-- CONTENT -->
<div id="sections-container"></div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <button class="modal-close" id="modal-close">✕</button>
    <div class="modal-inner">
      <div class="modal-poster"><img id="modal-img" src="" alt=""></div>
      <div class="modal-info">
        <div class="modal-title" id="modal-title"></div>
        <div class="modal-year" id="modal-year"></div>
        <div class="modal-genres" id="modal-genres"></div>
        <div class="modal-awards-title">Awards</div>
        <div class="modal-awards" id="modal-awards"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ── GENRES (Source of Truth) ──
const GENRES = [
  { name: 'Action', color: '#C0392B' },
  { name: 'Adventure', color: '#FF6E40' },
  { name: 'Animation', color: '#9CCC65' },
  { name: 'Comedy', color: '#E8B84B' },
  { name: 'Crime', color: '#C2547A' },
  { name: 'Drama', color: '#7B4FA6' },
  { name: 'Family', color: '#4DD0E1' },
  { name: 'Fantasy', color: '#42A5F5' },
  { name: 'Game Show', color: '#FFD54F' },
  { name: 'History', color: '#A1887F' },
  { name: 'Holiday', color: '#4CAF50' },
  { name: 'Horror', color: '#757575' },
  { name: 'Mini-Series', color: '#BA68C8' },
  { name: 'Music', color: '#FF9800' },
  { name: 'Musical', color: '#2E8B77' },
  { name: 'Mystery', color: '#6D4C41' },
  { name: 'Romance', color: '#EC407A' },
  { name: 'Sci-Fi', color: '#29B6F6' },
  { name: 'Sport', color: '#1976D2' },
  { name: 'Thriller', color: '#D81B60' },
  { name: 'War', color: '#37474F' },
  { name: 'Web Series', color: '#80DEEA' },
  { name: 'Western', color: '#E87B2C' }
];

// ── DATA ──
let TV_DATA = [];

// Generate legend dynamically
function generateLegend() {
  const legendSection = document.querySelector('.legend-section');
  const existingItems = legendSection.querySelectorAll('.legend-item');
  existingItems.forEach(item => item.remove());
  
  GENRES.forEach(genre => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<div class="legend-dot" style="background:${genre.color}"></div>${genre.name}`;
    // Insert before the badge row
    const badgeRow = legendSection.querySelector('.legend-badge-row');
    legendSection.insertBefore(item, badgeRow);
  });
}

// Generate filter buttons dynamically
function generateFilterButtons() {
  const filterBar = document.querySelector('.filter-bar');
  const existingBtns = filterBar.querySelectorAll('.filter-btn');
  existingBtns.forEach(btn => btn.remove());
  
  // Add "All" button first
  const allBtn = document.createElement('button');
  allBtn.className = 'filter-btn active';
  allBtn.dataset.filter = 'all';
  allBtn.style.background = '#3a3a3a';
  allBtn.textContent = 'All';
  filterBar.appendChild(allBtn);
  
  // Add genre buttons
  GENRES.forEach(genre => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.dataset.filter = genre.name;
    btn.style.background = genre.color;
    btn.textContent = genre.name;
    filterBar.appendChild(btn);
  });
  
  setupFilters();
}

// Fetch and transform data from data.json
async function loadTVData() {
  try {
    const response = await fetch('./data.json');
    const rawData = await response.json();
    
    // Transform data: convert 'genre' to 'genres'
    TV_DATA = rawData.map(item => ({
      title: item.title,
      poster: item.poster,
      genres: item.genre || [],
      year: item.year,
      awards: item.awards || []
    }));
    
    // Generate legend and filter buttons
    generateLegend();
    generateFilterButtons();
    
    // Initialize the UI after data is loaded
    setupSortDropdown();
    renderSections('all');
  } catch (error) {
    console.error('Error loading TV data:', error);
  }
}

// Setup filter event listeners
function setupFilters() {
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.filter;
      renderSections(activeFilter);
    });
  });
}

// ── CANONICAL GENRE MAPPING ──
const GENRE_MAP = {
  "Action":      "Action",
  "Adventure":   "Adventure",
  "Animation":   "Animation",
  "Comedy":      "Comedy",
  "Crime":       "Crime",
  "Drama":       "Drama",
  "Family":      "Family",
  "Fantasy":     "Fantasy",
  "Game Show":   "Game Show",
  "History":     "History",
  "Holiday":     "Holiday",
  "Horror":      "Horror",
  "Mini-Series": "Mini-Series",
  "Music":       "Music",
  "Musical":     "Musical",
  "Mystery":     "Mystery",
  "Romance":     "Romance",
  "Sci-Fi":      "Sci-Fi",
  "Sport":       "Sport",
  "Thriller":    "Thriller",
  "War":         "War",
  "Web Series":  "Web Series",
  "Western":     "Western"
};

const CANONICAL_PRIORITY = [
  "Action",
  "Adventure",
  "Animation",
  "Comedy",
  "Crime",
  "Drama",
  "Family",
  "Fantasy",
  "Game Show",
  "History",
  "Holiday",
  "Horror",
  "Mini-Series",
  "Music",
  "Musical",
  "Mystery",
  "Romance",
  "Sci-Fi",
  "Sport",
  "Thriller",
  "War",
  "Web Series",
  "Western"
];

const CANONICAL_COLORS = Object.fromEntries(GENRES.map(g => [g.name, g.color]));

function getCanonicalGenres(rawGenres) {
  const set = new Set();
  rawGenres.forEach(g => { if (GENRE_MAP[g]) set.add(GENRE_MAP[g]); });
  return [...set];
}

function getPrimaryCanonical(rawGenres) {
  const canonical = getCanonicalGenres(rawGenres);
  for (const c of CANONICAL_PRIORITY) {
    if (canonical.includes(c)) return c;
  }
  return canonical[0] || "Drama";
}

function hasOscarWin(awards) {
  return awards.some(a => {
    const lower = a.toLowerCase();
    return (lower.includes('emmy') || lower.includes('golden globe') || lower.includes('oscar') || lower.includes('sag') || lower.includes('bafta') || lower.includes('peabody') || lower.includes('annie') || lower.includes('hugo') || lower.includes('saturn') || lower.includes('crunchyroll') || lower.includes('writers guild') || lower.includes('david di') || lower.includes('animation kobe') || lower.includes('tca award') || lower.includes('royal television') || lower.includes('glaad') || lower.includes('people')) 
      && !lower.startsWith('nominated');
  });
}

function hasOscarNom(awards) {
  return awards.some(a => a.toLowerCase().startsWith('nominated'));
}

function awardBadge(awards) {
  if (!awards || awards.length === 0) return '';
  const isWinner = hasOscarWin(awards);
  const isNominee = hasOscarNom(awards);
  if (isWinner) {
    return `<svg class="award-badge badge-winner" width="52" height="52" viewBox="0 0 52 52" xmlns="http://www.w3.org/2000/svg">
      <circle cx="26" cy="26" r="25" fill="#f5f0e8" stroke="#D4A017" stroke-width="2.5"/>
      <text x="26" y="18" text-anchor="middle" font-size="7" font-weight="900" fill="#b8860b" font-family="sans-serif" letter-spacing="1">OSCAR</text>
      <text x="26" y="28" text-anchor="middle" font-size="6.5" font-weight="900" fill="#b8860b" font-family="sans-serif" letter-spacing="1">WINNER</text>
      <text x="26" y="43" text-anchor="middle" font-size="16">🏆</text>
    </svg>`;
  } else if (isNominee) {
    return `<svg class="award-badge badge-nominee" width="52" height="52" viewBox="0 0 52 52" xmlns="http://www.w3.org/2000/svg">
      <circle cx="26" cy="26" r="25" fill="#f5f0e8" stroke="#aaaaaa" stroke-width="2"/>
      <text x="26" y="18" text-anchor="middle" font-size="7" font-weight="900" fill="#666" font-family="sans-serif" letter-spacing="1">OSCAR</text>
      <text x="26" y="28" text-anchor="middle" font-size="5.5" font-weight="900" fill="#666" font-family="sans-serif" letter-spacing="1">NOMINEE</text>
      <text x="26" y="43" text-anchor="middle" font-size="16">🏆</text>
    </svg>`;
  }
  return '';
}

const SECTION_ORDER = CANONICAL_PRIORITY.map(cat => ({
  key: cat, label: cat, color: CANONICAL_COLORS[cat],
}));

// ── RENDER ──
let activeFilter = "all";
let activeSort = "genre";

// Setup sort dropdown
function setupSortDropdown() {
  const sortSelect = document.getElementById('sort-select');
  sortSelect.addEventListener('change', (e) => {
    activeSort = e.target.value;
    renderSections(activeFilter);
  });
}

function renderSections(filter) {
  const container = document.getElementById('sections-container');
  container.innerHTML = '';

  SECTION_ORDER.forEach(section => {
    let sectionItems = TV_DATA.filter(d => getPrimaryCanonical(d.genres) === section.key);
    
    // Apply genre filter
    if (filter !== 'all') {
      sectionItems = sectionItems.filter(d => d.genres.includes(filter));
    }
    
    // Apply sort
    if (activeSort === 'a-z') {
      sectionItems.sort((a, b) => a.title.localeCompare(b.title));
    } else if (activeSort === 'year') {
      sectionItems.sort((a, b) => {
        const yearA = parseInt(a.year.split('–')[0]);
        const yearB = parseInt(b.year.split('–')[0]);
        return yearA - yearB;
      });
    }
    
    if (sectionItems.length === 0) return;

    const gridId = 'grid-' + section.key.replace(/[^a-z0-9]/gi, '_');
    const sec = document.createElement('div');
    sec.className = 'genre-section';
    sec.innerHTML = `
      <div class="genre-header">
        <div class="genre-label-pill" style="background:${section.color}">
          <div class="dot"></div>
          ${section.label}
        </div>
        <span class="genre-count">${sectionItems.length} show${sectionItems.length !== 1 ? 's' : ''}</span>
      </div>
      <div class="cards-grid" id="${gridId}"></div>
    `;
    container.appendChild(sec);

    const grid = sec.querySelector('#' + gridId);
    sectionItems.forEach(show => {
      const badge = awardBadge(show.awards);
      const card = document.createElement('div');
      card.className = 'card';
      const posterClass = show.poster ? '' : ' no-poster';
      const posterHtml = `
        <div class="poster-wrap${posterClass}">
          ${show.poster ? `<img src="${show.poster}" alt="${show.title}" loading="lazy">` : ''}
          ${show.poster ? badge : ''}
        </div>
      `;
      card.innerHTML = `
        <div class="card-title">${show.title}</div>
        ${posterHtml}
        <div class="card-meta">${show.year}</div>
      `;
      card.addEventListener('click', () => openModal(show));
      grid.appendChild(card);
    });
  });
}

// ── MODAL ──
function openModal(show) {
  const modalPoster = document.querySelector('.modal-poster');
  if (show.poster) {
    document.getElementById('modal-img').src = show.poster;
    modalPoster.style.display = 'block';
  } else {
    modalPoster.style.display = 'none';
  }
  document.getElementById('modal-title').textContent = show.title;
  document.getElementById('modal-year').textContent = show.year;
  
  const genresEl = document.getElementById('modal-genres');
  const canonicalGenres = getCanonicalGenres(show.genres);
  genresEl.innerHTML = canonicalGenres.map(c => {
    const color = CANONICAL_COLORS[c] || '#C0392B';
    return `<span class="modal-genre-tag" style="background:${color}">${c}</span>`;
  }).join('');

  const awardsEl = document.getElementById('modal-awards');
  if (show.awards && show.awards.length > 0) {
    awardsEl.innerHTML = `<ul>${show.awards.map(a => `<li>${a}</li>`).join('')}</ul>`;
  } else {
    awardsEl.innerHTML = `<p style="font-size:.75rem;color:#888;font-weight:700;">No major awards recorded.</p>`;
  }

  document.getElementById('modal-overlay').classList.add('open');
}

document.getElementById('modal-close').addEventListener('click', () => {
  document.getElementById('modal-overlay').classList.remove('open');
});
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay'))
    document.getElementById('modal-overlay').classList.remove('open');
});

// ── INIT ──
loadTVData();
</script>
